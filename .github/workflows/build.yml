name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/PMTool.sln

      - name: Build
        run: dotnet build src/PMTool.sln -c Release --no-restore

      - name: Test
        run: dotnet test src/PMTool.sln -c Release --no-build --verbosity normal

      - name: Publish (win-x64, framework-dependent)
        run: >
          dotnet publish src/PMTool.App/PMTool.App.csproj
          -c Release
          --no-restore
          -p:Platform=x64
          -p:RuntimeIdentifier=win-x64
          -p:SelfContained=false
          -p:PublishTrimmed=false

      - name: Upload published app
        uses: actions/upload-artifact@v4
        with:
          name: PMTool-publish-win-x64
          path: |
            src/PMTool.App/bin/Release/net8.0-windows10.0.19041.0/win-x64/publish/
